<!DOCTYPE html>
<title>application-context media feature in iframe</title>
<script>
window.addEventListener("message", e => {
    if (e.data !== "report")
        return;
    e.source.postMessage({
        origin: self.origin,
        installed: window.matchMedia("(application-context: installed)").matches,
        browser: window.matchMedia("(application-context: browser)").matches,
    }, "*");
});
</script>
