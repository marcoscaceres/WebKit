<!doctype html>
<meta charset="utf-8" />
<!-- Recursive relay frame for bless-nested.sub.html: builds the next descendant, then on
     command blesses / reports / consumes at its own depth and posts results to window.top. -->
<script src="/resources/testdriver.js"></script>
<script src="/resources/testdriver-vendor.js"></script>
<body></body>
<script type="module">
    const params = new URLSearchParams(location.search);
    const id = params.get("id");
    const depth = parseInt(params.get("depth"), 10);
    // chain: origin URLs for this frame's descendants, resolved by the top.
    const chain = JSON.parse(decodeURIComponent(params.get("chain") || "[]"));

    const toTop = (msg) => window.top.postMessage(JSON.stringify(msg), "*");

    if (!window.internals) {
        toTop({
            id,
            depth,
            type: "error",
            reason: "no internals in this frame",
        });
    } else {
        runRelay();
    }

    function runRelay() {
        // Build the next descendant, offset so the coordinate-free activation path is exercised.
        if (chain.length) {
            const childSrc =
                chain[0] +
                location.pathname +
                `?id=${id}&depth=${depth + 1}&chain=${encodeURIComponent(JSON.stringify(chain.slice(1)))}`;
            const iframe = document.createElement("iframe");
            iframe.style =
                "position:absolute; left:280px; top:190px; width:300px; height:200px;";
            iframe.src = childSrc;
            document.body.appendChild(iframe);
        }

        window.addEventListener("message", async (event) => {
            if (typeof event.data !== "string") return;
            let msg;
            try {
                msg = JSON.parse(event.data);
            } catch {
                return;
            }
            if (msg.id !== id || msg.targetDepth !== depth || !msg.cmd) return;

            switch (msg.cmd) {
                case "bless":
                    try {
                        await test_driver.bless("user activation");
                        toTop({
                            id,
                            depth,
                            type: "done",
                            ok: true,
                            isActive: navigator.userActivation.isActive,
                        });
                    } catch (error) {
                        toTop({
                            id,
                            depth,
                            type: "done",
                            ok: false,
                            error: String(error),
                            stack: error?.stack,
                        });
                    }
                    break;
                case "report":
                    toTop({
                        id,
                        depth,
                        type: "state",
                        hasBeenActive: navigator.userActivation.hasBeenActive,
                    });
                    break;
            }
        });

        toTop({ id, depth, type: "ready" });
    }
</script>
